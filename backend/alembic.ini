[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Detta värde är bara en platshållare.
# Den riktiga DATABASE_URL ska hämtas från miljövariabeln i migrations/env.py.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@postgres:5432/ai_film_studio

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S