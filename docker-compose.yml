services:
  redis:
    image: redis:7-alpine
    container_name: ai-film-studio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-film-studio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_BASE_URL: http://backend:8000
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-film-studio-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_BASE_URL: http://backend:8000
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    command: python worker.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-film-studio-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0